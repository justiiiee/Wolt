<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUSTI'S WOLT TRACKER</title>
<style>
  * { box-sizing: border-box; font-family: Arial, sans-serif; }
  body { margin: 0; background: #0f172a; color: white; }
  .container { max-width: 450px; margin: auto; padding: 20px; }
  h1 { text-align: center; color: #00d4ff; }

  .nav {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .nav button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: #1e293b;
    color: white;
    cursor: pointer;
    font-weight: bold;
  }

  .nav button.active {
    background: #00d4ff;
    color: black;
  }

  .card {
    background: #1e293b;
    padding: 20px;
    border-radius: 16px;
    margin-bottom: 20px;
  }

  .earnings {
    font-size: 42px;
    font-weight: bold;
    text-align: center;
    margin: 15px 0;
  }

  .small {
    font-size: 14px;
    color: #cbd5e1;
    margin: 8px 0;
  }

  input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    margin-top: 10px;
    font-size: 16px;
  }

  button.main-btn {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    background: #00d4ff;
    color: black;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }

  button.danger {
    background: #ef4444;
    color: white;
  }

  .progress-bar {
    width: 100%;
    height: 20px;
    background: #334155;
    border-radius: 12px;
    overflow: hidden;
    margin: 15px 0;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: #00d4ff;
    transition: 0.3s;
  }

  .history-item {
    background: #334155;
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 10px;
    font-size: 14px;
  }

  .green { color: #22c55e; }
  .red { color: #ef4444; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="container">
  <h1>WOLT TRACKER</h1>

  <div class="nav">
    <button id="homeBtn" class="active" onclick="showPage('home')">Home</button>
    <button id="historyBtn" onclick="showPage('history')">History</button>
    <button id="settingsBtn" onclick="showPage('settings')">Settings</button>
  </div>

  <!-- HOME -->
  <div id="homePage">
    <div class="card">
      <div class="small">Select Date</div>
      <input type="date" id="selectedDate" onchange="updateUI()">

      <div class="small">Required Target</div>
      <div class="earnings">€<span id="requiredTarget">50.00</span></div>

      <div class="small">Earned</div>
      <div class="earnings">€<span id="earnedTotal">0.00</span></div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="small">
        Remaining / Balance:
        <span id="balanceText">€50.00</span>
      </div>

      <input type="number" id="amountInput" placeholder="Enter earning amount (€)">
      <button class="main-btn" onclick="addEarning()">+ Add Earning</button>
      <button class="main-btn danger" onclick="resetDay()">Reset Day</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="historyPage" class="hidden">
    <div class="card">
      <h3>History</h3>
      <div id="historyList"></div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="settingsPage" class="hidden">
    <div class="card">
      <h3>Base Daily Target</h3>
      <input type="number" id="targetInput" placeholder="Enter target (€)">
      <button class="main-btn" onclick="saveTarget()">Save Target</button>
    </div>
  </div>
</div>

<script>
  let baseTarget = parseFloat(localStorage.getItem("baseTarget")) || 50;
  let entries = JSON.parse(localStorage.getItem("entries")) || {};

  function getTodayDate() {
    return new Date().toISOString().split("T")[0];
  }

  document.getElementById("selectedDate").value = getTodayDate();

  function saveData() {
    localStorage.setItem("baseTarget", baseTarget);
    localStorage.setItem("entries", JSON.stringify(entries));
  }

  function getSortedDates() {
    return Object.keys(entries).sort();
  }

  function calculateTargetForDate(selectedDate) {
    let carry = 0;
    const sortedDates = getSortedDates();

    for (let date of sortedDates) {
      if (date >= selectedDate) break;

      const target = baseTarget + carry;
      const earned = entries[date];
      carry = target - earned;
    }

    return Math.max(0, baseTarget + carry);
  }

  function addEarning() {
    const date = document.getElementById("selectedDate").value;
    const amount = parseFloat(document.getElementById("amountInput").value);

    if (!date || isNaN(amount) || amount <= 0) {
      alert("Enter valid date and amount.");
      return;
    }

    if (!entries[date]) entries[date] = 0;
    entries[date] += amount;

    document.getElementById("amountInput").value = "";

    saveData();
    updateUI();
  }

  function resetDay() {
    const date = document.getElementById("selectedDate").value;

    if (confirm("Reset this day's earnings?")) {
      delete entries[date];
      saveData();
      updateUI();
    }
  }

  function saveTarget() {
    const newTarget = parseFloat(document.getElementById("targetInput").value);

    if (!isNaN(newTarget) && newTarget > 0) {
      baseTarget = newTarget;
      saveData();
      updateUI();
      alert("Target updated.");
    }
  }

  function updateUI() {
    const date = document.getElementById("selectedDate").value;
    const earned = entries[date] || 0;
    const target = calculateTargetForDate(date);
    const balance = target - earned;

    document.getElementById("requiredTarget").innerText = target.toFixed(2);
    document.getElementById("earnedTotal").innerText = earned.toFixed(2);

    const balanceText = document.getElementById("balanceText");

    if (balance > 0) {
      balanceText.innerHTML = `<span class="red">€${balance.toFixed(2)} remaining</span>`;
    } else {
      balanceText.innerHTML = `<span class="green">€${Math.abs(balance).toFixed(2)} surplus</span>`;
    }

    let progress = (earned / target) * 100;
    if (progress > 100) progress = 100;

    document.getElementById("progressFill").style.width = progress + "%";

    renderHistory();
  }

  function renderHistory() {
    const historyList = document.getElementById("historyList");
    historyList.innerHTML = "";

    const sortedDates = getSortedDates().reverse();

    if (sortedDates.length === 0) {
      historyList.innerHTML = "<p>No history yet.</p>";
      return;
    }

    sortedDates.forEach(date => {
      const target = calculateTargetForDate(date);
      const earned = entries[date];
      const diff = earned - target;

      historyList.innerHTML += `
        <div class="history-item">
          <strong>${date}</strong><br>
          Target: €${target.toFixed(2)}<br>
          Earned: €${earned.toFixed(2)}<br>
          ${
            diff >= 0
              ? `<span class="green">+€${diff.toFixed(2)} surplus</span>`
              : `<span class="red">-€${Math.abs(diff).toFixed(2)} short</span>`
          }
        </div>
      `;
    });
  }

  function showPage(page) {
    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("historyPage").classList.add("hidden");
    document.getElementById("settingsPage").classList.add("hidden");

    document.getElementById("homeBtn").classList.remove("active");
    document.getElementById("historyBtn").classList.remove("active");
    document.getElementById("settingsBtn").classList.remove("active");

    if (page === "home") {
      document.getElementById("homePage").classList.remove("hidden");
      document.getElementById("homeBtn").classList.add("active");
    }

    if (page === "history") {
      document.getElementById("historyPage").classList.remove("hidden");
      document.getElementById("historyBtn").classList.add("active");
    }

    if (page === "settings") {
      document.getElementById("settingsPage").classList.remove("hidden");
      document.getElementById("settingsBtn").classList.add("active");
    }
  }

  updateUI();
</script>

</body>
</html>
