<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Justi's WOLT TRACKER</title>
<style>
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  color: white;
  background:
    linear-gradient(rgba(15,23,42,0.75), rgba(15,23,42,0.85)),
    url('https://images.unsplash.com/photo-1519003722824-194d4455a60c?auto=format&fit=crop&w=1400&q=80');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

.container {
  max-width: 450px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #00d4ff;
  letter-spacing: 2px;
}

.nav {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.nav button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 14px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.nav button.active {
  background: #00d4ff;
  color: black;
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,0.15);
}

.big {
  font-size: 32px;
  font-weight: bold;
  text-align: center;
  margin: 8px 0 18px;
}

.small {
  color: #dbeafe;
  font-size: 14px;
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  background: rgba(255,255,255,0.15);
  color: white;
}

input::placeholder {
  color: #cbd5e1;
}

button.main {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 14px;
  background: #00d4ff;
  color: black;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
}

button.danger {
  background: #ef4444;
  color: white;
}

.progress {
  width: 100%;
  height: 20px;
  background: rgba(255,255,255,0.15);
  border-radius: 14px;
  overflow: hidden;
  margin: 15px 0;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: #00d4ff;
  transition: 0.3s;
}

.history-item {
  background: rgba(255,255,255,0.12);
  padding: 14px;
  border-radius: 14px;
  margin-bottom: 10px;
}

.green { color: #22c55e; }
.red { color: #ef4444; }
.hidden { display: none; }
</style>
</head>
<body>

<div class="container">
  <h1>WOLT TRACKER</h1>

  <div class="nav">
    <button id="homeBtn" class="active" onclick="showPage('home')">Home</button>
    <button id="historyBtn" onclick="showPage('history')">History</button>
  </div>

  <div id="homePage">
    <div class="card">
      <div class="small">Select Date</div>
      <input type="date" id="selectedDate" onchange="updateUI()">

      <div class="small">Required Today</div>
      <div class="big">€<span id="requiredAmount">50.00</span></div>

      <div class="small">Earned Today</div>
      <div class="big">€<span id="earnedAmount">0.00</span></div>

      <div class="small">TOTAL EARNED</div>
      <div class="big">€<span id="totalEarned">0.00</span></div>

      <div class="progress">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div id="statusText" class="small"></div>

      <input type="number" id="amountInput" placeholder="Enter earning (€)">
      <button class="main" onclick="addEarning()">+ Add Earning</button>
      <button class="main danger" onclick="resetDay()">Reset Day</button>
    </div>
  </div>

  <div id="historyPage" class="hidden">
    <div class="card">
      <h3>History</h3>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<script>
const DAILY_TARGET = 50;
let entries = JSON.parse(localStorage.getItem("entries")) || {};

function today() {
  return new Date().toISOString().split("T")[0];
}

document.getElementById("selectedDate").value = today();

function saveData() {
  localStorage.setItem("entries", JSON.stringify(entries));
}

function sortedDates() {
  return Object.keys(entries).sort();
}

function calculateRequired(date) {
  let carry = 0;
  const dates = sortedDates();

  for (let d of dates) {
    if (d >= date) break;
    carry += DAILY_TARGET - entries[d];
  }

  return Math.max(0, DAILY_TARGET + carry);
}

function addEarning() {
  const date = document.getElementById("selectedDate").value;
  const amount = parseFloat(document.getElementById("amountInput").value);

  if (!date || isNaN(amount) || amount <= 0) {
    alert("Enter valid amount.");
    return;
  }

  entries[date] = (entries[date] || 0) + amount;
  document.getElementById("amountInput").value = "";
  saveData();
  updateUI();
}

function resetDay() {
  const date = document.getElementById("selectedDate").value;

  if (confirm("Reset this day?")) {
    delete entries[date];
    saveData();
    updateUI();
  }
}

function updateUI() {
  const date = document.getElementById("selectedDate").value;
  const earned = entries[date] || 0;
  const required = calculateRequired(date);
  const diff = earned - required;

  const total = Object.values(entries).reduce((sum, val) => sum + val, 0);

  document.getElementById("requiredAmount").innerText = required.toFixed(2);
  document.getElementById("earnedAmount").innerText = earned.toFixed(2);
  document.getElementById("totalEarned").innerText = total.toFixed(2);

  let progress = required > 0 ? (earned / required) * 100 : 100;
  if (progress > 100) progress = 100;

  document.getElementById("progressFill").style.width = progress + "%";

  if (diff >= 0) {
    statusText.innerHTML = `<span class="green">Surplus: €${diff.toFixed(2)}</span>`;
  } else {
    statusText.innerHTML = `<span class="red">Remaining: €${Math.abs(diff).toFixed(2)}</span>`;
  }

  renderHistory();
}

function renderHistory() {
  const list = document.getElementById("historyList");
  list.innerHTML = "";

  const dates = sortedDates().reverse();

  if (!dates.length) {
    list.innerHTML = "<p>No history yet.</p>";
    return;
  }

  dates.forEach(date => {
    const required = calculateRequired(date);
    const earned = entries[date];
    const diff = earned - required;

    list.innerHTML += `
      <div class="history-item">
        <strong>${date}</strong><br>
        Required: €${required.toFixed(2)}<br>
        Earned: €${earned.toFixed(2)}<br>
        ${
          diff >= 0
            ? `<span class="green">+€${diff.toFixed(2)}</span>`
            : `<span class="red">-€${Math.abs(diff).toFixed(2)}</span>`
        }
      </div>
    `;
  });
}

function showPage(page) {
  homePage.classList.add("hidden");
  historyPage.classList.add("hidden");

  homeBtn.classList.remove("active");
  historyBtn.classList.remove("active");

  if (page === "home") {
    homePage.classList.remove("hidden");
    homeBtn.classList.add("active");
  }

  if (page === "history") {
    historyPage.classList.remove("hidden");
    historyBtn.classList.add("active");
  }
}

updateUI();
</script>

</body>
</html>
