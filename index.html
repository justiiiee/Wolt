<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wolt Number Helper</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #fff8dc;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 450px;
      background: #ffffff;
      border: 4px solid #000;
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    h1 {
      text-align: center;
      margin: 0 0 8px;
      font-size: 34px;
      color: #000;
      font-weight: 900;
    }

    .subtitle {
      text-align: center;
      font-size: 18px;
      color: #222;
      margin-bottom: 24px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 24px;
      font-size: 48px;
      font-weight: bold;
      text-align: center;
      border: 4px solid #000;
      border-radius: 20px;
      background: #ffff66;
      color: #000;
      outline: none;
    }

    .hint {
      text-align: center;
      margin-top: 10px;
      font-size: 16px;
      font-weight: bold;
      color: #444;
    }

    .result {
      margin-top: 24px;
      background: #f5f5f5;
      border: 3px solid #000;
      border-radius: 20px;
      padding: 20px;
      display: none;
    }

    .label {
      font-size: 16px;
      font-weight: 900;
      color: #000;
      margin-bottom: 8px;
    }

    .slovenian {
      font-size: 38px;
      font-weight: 900;
      color: #000;
      line-height: 1.4;
      margin-bottom: 20px;
      word-break: break-word;
    }

    .english {
      font-size: 28px;
      font-weight: bold;
      color: #111;
      line-height: 1.4;
      word-break: break-word;
    }

    .error {
      margin-top: 18px;
      background: #ffdddd;
      border: 3px solid #cc0000;
      color: #cc0000;
      padding: 14px;
      border-radius: 16px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      display: none;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 30px;
      }

      input {
        font-size: 42px;
        padding: 20px;
      }

      .slovenian {
        font-size: 32px;
      }

      .english {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

<div class="app">
  <h1>🚴 WOLT HELPER</h1>
  <div class="subtitle">Type 3-digit order number</div>

  <input
    type="tel"
    id="numberInput"
    maxlength="3"
    placeholder="564"
    inputmode="numeric"
    oninput="convertNumber()"
  >

  <div class="hint">Instant conversion while typing</div>

  <div id="error" class="error"></div>

  <div id="result" class="result">
    <div class="label">SLOVENIAN:</div>
    <div id="slovenianText" class="slovenian"></div>

    <div class="label">PRONUNCIATION:</div>
    <div id="englishText" class="english"></div>
  </div>
</div>

<script>
  const numbers = {
    "0": ["nič", "neech"],
    "1": ["ena", "eh-na"],
    "2": ["dva", "dva"],
    "3": ["tri", "tree"],
    "4": ["štiri", "shtee-ree"],
    "5": ["pet", "pet"],
    "6": ["šest", "shest"],
    "7": ["sedem", "seh-dem"],
    "8": ["osem", "oh-sem"],
    "9": ["devet", "deh-vet"]
  };

  function convertNumber() {
    const input = document.getElementById("numberInput").value.replace(/\D/g, "");
    const error = document.getElementById("error");
    const result = document.getElementById("result");

    document.getElementById("numberInput").value = input;

    if (input.length === 0) {
      error.style.display = "none";
      result.style.display = "none";
      return;
    }

    if (input.length < 3) {
      error.style.display = "block";
      error.textContent = "Enter 3 digits";
      result.style.display = "none";
      return;
    }

    let slovenian = [];
    let english = [];

    for (let digit of input) {
      slovenian.push(numbers[digit][0]);
      english.push(numbers[digit][1]);
    }

    document.getElementById("slovenianText").textContent = slovenian.join(" • ");
    document.getElementById("englishText").textContent = english.join(" • ");

    error.style.display = "none";
    result.style.display = "block";
  }
</script>

</body>
</html>
